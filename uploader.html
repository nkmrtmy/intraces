<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nkmr_in_traces 上传器</title>
<style>
  :root {
    --bg: #14100c; --card: #201a15; --ink: #ede6d6; --ink-dim: #a99a86;
    --accent: #b8935a; --ok: #7fcf9f; --err: #d97b6c; --border: #382e24;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Noto Sans SC", sans-serif;
    padding: 40px 24px 100px; max-width: 760px; margin-inline: auto;
  }
  h1 { font-size: 20px; letter-spacing: 0.04em; margin-bottom: 4px; }
  .sub { color: var(--ink-dim); font-size: 13px; margin-bottom: 28px; }
  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 20px 22px; margin-bottom: 20px;
  }
  .panel h2 { font-size: 14px; margin: 0 0 14px; color: var(--accent); letter-spacing: 0.05em; }
  label { display: block; font-size: 12.5px; color: var(--ink-dim); margin: 12px 0 5px; }
  input[type=text], input[type=number], textarea {
    width: 100%; background: #0f0c09; border: 1px solid var(--border); color: var(--ink);
    border-radius: 4px; padding: 9px 11px; font-size: 13.5px; font-family: inherit;
  }
  input:disabled, select:disabled, textarea:disabled, button:disabled {
    opacity: 0.35; cursor: not-allowed;
  }
  textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  select {
    width: 100%; background: #0f0c09; border: 1px solid var(--border); color: var(--ink);
    border-radius: 4px; padding: 9px 11px; font-size: 13.5px; font-family: inherit;
  }
  .preview-wrap { text-align: center; }
  .preview-disc {
    width: 160px; height: 160px; border-radius: 50%; margin: 0 auto;
    position: relative; overflow: hidden;
    background: repeating-conic-gradient(#2a2620 0% 25%, #221f19 0% 50%) 50% / 16px 16px;
    border: 1px solid var(--border);
  }
  .preview-disc img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview-hole {
    position: absolute; top: 50%; left: 50%;
    width: 30%; height: 30%; margin: -15% 0 0 -15%;
    border-radius: 50%;
    background: radial-gradient(circle, transparent 0% 50%, rgba(12,10,8,0.7) 51% 100%);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.55);
  }
  .preview-label {
    position: absolute;
    font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    text-shadow: 0 0 4px rgba(255,255,255,0.9), 0 0 10px rgba(200,255,220,0.6);
    line-height: 1.2;
    pointer-events: none;
  }
  .preview-primary { font-size: 11px; font-weight: 900; margin-bottom: 2px; }
  .preview-secondary { font-size: 7px; font-weight: 700; color: rgba(255,255,255,0.68); }
  .preview-label.pos-top { top: 11%; left: 50%; transform: translateX(-50%); text-align: center; max-width: 78%; }
  .preview-label.pos-bottom { bottom: 9%; top: auto; left: 50%; transform: translateX(-50%); text-align: center; max-width: 78%; }
  .preview-label.pos-left { top: 50%; right: 57.5%; transform: translateY(-50%); text-align: right; max-width: 40%; }
  .preview-label.pos-right { top: 50%; left: 57.5%; transform: translateY(-50%); text-align: left; max-width: 40%; }
  .row2 { display: flex; gap: 14px; }
  .row2 > div { flex: 1; }
  button {
    background: #33291d; color: var(--ink); border: 1px solid var(--border);
    padding: 9px 16px; border-radius: 4px; font-size: 13px; cursor: pointer;
  }
  button:hover { background: #40331f; }
  button.primary { background: var(--accent); color: #14100c; font-weight: 700; border: none; }
  button.primary:hover { background: #c9a56b; }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost { background: none; }
  .file-row { display: flex; align-items: center; gap: 10px; }
  .file-name { font-size: 12px; color: var(--ink-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status { font-size: 12.5px; padding: 10px 12px; border-radius: 4px; margin-bottom: 16px; display: none; }
  .status.show { display: block; }
  .status.ok { background: rgba(127,207,159,0.12); color: var(--ok); border: 1px solid rgba(127,207,159,0.3); }
  .status.err { background: rgba(217,123,108,0.12); color: var(--err); border: 1px solid rgba(217,123,108,0.3); }
  .iv-list { margin-top: 12px; }
  .iv-item {
    background: #0f0c09; border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 12px; margin-bottom: 8px; font-size: 12.5px;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .iv-item span { color: var(--ink-dim); }
  .hint { font-size: 11px; color: var(--ink-dim); }
  .folder-name { color: var(--accent); font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  /* ---------- 模式选择 ---------- */
  .mode-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .mode-tabs label {
    margin: 0; display: flex; align-items: center; gap: 6px;
    background: #0f0c09; border: 1px solid var(--border); border-radius: 4px;
    padding: 8px 12px; font-size: 12.5px; color: var(--ink-dim); cursor: pointer;
  }
  .mode-tabs input[type=radio] { accent-color: var(--accent); }
  .mode-tabs input[type=radio]:checked + span { color: var(--ink); font-weight: 600; }
  #uidLookupInfo { font-size: 11.5px; margin-top: 6px; min-height: 16px; }
  #uidLookupInfo.ok { color: var(--ok); }
  #uidLookupInfo.warn { color: var(--err); }

  /* ---------- 编辑模式下的字段勾选框 ---------- */
  .field-group { border: 1px solid transparent; border-radius: 4px; padding: 2px 0; transition: opacity 0.2s; }
  .field-group.dim { opacity: 0.55; }
  .field-check {
    display: none; align-items: center; gap: 8px;
    font-size: 12.5px; color: var(--ink); margin: 14px 0 4px;
    cursor: pointer;
  }
  .field-check input { accent-color: var(--accent); }

  /* ---------- 按模式隐藏区块 ---------- */
  #deleteInterviewFields { display: none; }
  #formPanel[data-mode="deleteDisc"] #fullFormFields,
  #formPanel[data-mode="deleteDisc"] #interviewFields,
  #formPanel[data-mode="deleteInterview"] #fullFormFields,
  #formPanel[data-mode="deleteInterview"] #interviewFields { display: none; }
  #formPanel[data-mode="deleteInterview"] #deleteInterviewFields { display: block; }

  /* ---------- 碟片裁剪器 ---------- */
  .cropper-modal {
    position: fixed; inset: 0; z-index: 500;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75);
  }
  .cropper-modal.open { display: flex; }
  .cropper-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 24px; width: 420px; text-align: center;
  }
  .cropper-box h3 { margin: 0 0 4px; font-size: 15px; }
  .cropper-hint { font-size: 11.5px; color: var(--ink-dim); margin-bottom: 14px; }
  .cropper-canvas-wrap {
    width: 300px; height: 300px; margin: 0 auto 16px;
    border-radius: 50%; overflow: hidden; position: relative;
    background: repeating-conic-gradient(#2a2620 0% 25%, #221f19 0% 50%) 50% / 20px 20px;
    cursor: grab; touch-action: none;
  }
  .cropper-canvas-wrap:active { cursor: grabbing; }
  .cropper-canvas-wrap canvas { position: absolute; top: 0; left: 0; width: 300px; height: 300px; }
  .cropper-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .cropper-controls input[type=range] { flex: 1; }
  .cropper-actions { display: flex; justify-content: center; gap: 10px; }
  .thumb-preview {
    width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
    border: 1px solid var(--border); flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>nkmr_in_traces 上传器</h1>
<div class="sub">用 Chrome 打开，选一次项目文件夹后即可直接写入图片和数据，不需要安装任何东西。</div>

<div id="statusBox" class="status"></div>

<div class="panel">
  <h2>第一步：选择项目文件夹</h2>
  <button id="pickFolderBtn">选择项目文件夹…</button>
  <div class="hint" id="folderInfo">尚未选择文件夹。请选择包含 index.html 的那个项目文件夹本身。</div>
</div>

<div class="panel" id="formPanel" style="display:none;" data-mode="add">
  <h2 id="formHeading">新增碟片</h2>

  <div class="mode-tabs" id="modeTabs">
    <label><input type="radio" name="mode" value="add" checked><span>新增碟片</span></label>
    <label><input type="radio" name="mode" value="edit"><span>修改碟片</span></label>
    <label><input type="radio" name="mode" value="deleteDisc"><span>删除碟片</span></label>
    <label><input type="radio" name="mode" value="deleteInterview"><span>删除采访</span></label>
  </div>

  <label>碟片编号 (uid) *</label>
  <input type="text" id="uid" placeholder="例如 001">
  <div class="hint" id="uidHintText"></div>
  <div id="uidLookupInfo"></div>

  <div id="deleteInterviewFields">
    <label>要删除第几篇采访（按网页从上到下的顺序，多个用空格隔开，例如：1 3）</label>
    <input type="text" id="deleteIvIndexes" placeholder="1 3">
  </div>

  <div id="fullFormFields">

    <div class="field-group" data-field="basic">
      <label class="field-check"><input type="checkbox" class="fieldToggle" checked><span>修改基本信息（剧名 / 角色名 / 年份）</span></label>
      <label>剧名 *</label>
      <input type="text" id="title">
      <div class="row2">
        <div>
          <label>角色名（选填）</label>
          <input type="text" id="role">
        </div>
        <div>
          <label>年份 *</label>
          <input type="number" id="year" placeholder="2024">
        </div>
      </div>
    </div>

    <div class="field-group" data-field="disc">
      <label class="field-check"><input type="checkbox" class="fieldToggle" checked><span>修改碟片图片</span></label>
      <label>碟片图片 *（拨选界面显示的圆形图，选择后可拖动缩放取景）</label>
      <div class="file-row">
        <button id="discPickBtn" type="button">选择文件…</button>
        <img id="discThumb" class="thumb-preview" style="display:none;">
        <span class="file-name" id="discFileName">未选择</span>
      </div>
    </div>

    <div class="field-group" data-field="textPosition">
      <label class="field-check"><input type="checkbox" class="fieldToggle" checked><span>修改 DVD 文字位置</span></label>
      <label>DVD 文字位置（角色名/剧名印在碟片上的位置）</label>
      <div class="row2">
        <div>
          <select id="textPosition">
            <option value="left">左（靠孔左侧）</option>
            <option value="right">右（靠孔右侧）</option>
            <option value="top">上</option>
            <option value="bottom">下</option>
          </select>
        </div>
        <div class="preview-wrap">
          <div class="preview-disc" id="previewDisc">
            <img id="previewDiscImg" style="display:none;">
            <div class="preview-hole"></div>
            <div class="preview-label pos-left" id="previewLabel">
              <div class="preview-primary" id="previewPrimary">角色名</div>
              <div class="preview-secondary" id="previewSecondary">剧名</div>
            </div>
          </div>
          <div class="hint" style="margin-top:6px;">实时预览，仅供参考</div>
        </div>
      </div>
    </div>

    <div class="field-group" data-field="cover">
      <label class="field-check"><input type="checkbox" class="fieldToggle" checked><span>修改背景大图</span></label>
      <label>背景大图（选填，不选则用碟片图代替）</label>
      <div class="file-row">
        <button id="coverPickBtn" type="button">选择文件…</button>
        <img id="coverThumb" class="thumb-preview" style="display:none; border-radius: 4px;">
        <span class="file-name" id="coverFileName">未选择</span>
      </div>
    </div>

  </div>

  <div class="divider"></div>

  <div id="interviewFields">
    <div class="field-group" data-field="interview">
      <label class="field-check"><input type="checkbox" class="fieldToggle" checked><span>新增采访</span></label>
      <h2>添加一条或多条采访（可不填，之后再补）</h2>

      <label>采访标题（日语原文）</label>
      <input type="text" id="ivTitle">

      <label>采访标题（中文翻译，选填）</label>
      <input type="text" id="ivTitleZh">

      <div class="row2">
        <div>
          <label>日期</label>
          <input type="text" id="ivDate" placeholder="2024-05-01">
        </div>
        <div>
          <label>来源</label>
          <input type="text" id="ivSource" placeholder="杂志 / 网站名">
        </div>
      </div>

      <label>链接 URL</label>
      <input type="text" id="ivUrl" placeholder="https://...">

      <div class="row2">
        <div>
          <label>日语原文（每段换行）</label>
          <textarea id="ivJa"></textarea>
        </div>
        <div>
          <label>中文翻译（每段换行，与左边一一对应）</label>
          <textarea id="ivZh"></textarea>
        </div>
      </div>

      <div style="margin-top:12px;">
        <button id="addInterviewBtn" type="button">＋ 添加这条采访到列表</button>
      </div>

      <div class="iv-list" id="ivList"></div>
    </div>
  </div>

  <div class="divider"></div>

  <button class="primary" id="submitBtn">提交，写入网站数据</button>
</div>

<div class="cropper-modal" id="cropperModal">
  <div class="cropper-box">
    <h3>调整碟片取景</h3>
    <div class="cropper-hint">拖动图片调整位置，滑块调整缩放，中间的孔位置固定不动</div>
    <div class="cropper-canvas-wrap" id="cropperWrap">
      <canvas id="cropperCanvas" width="600" height="600"></canvas>
    </div>
    <div class="cropper-controls">
      <span style="font-size:11px;color:var(--ink-dim);">缩放</span>
      <input type="range" id="cropperZoom" min="100" max="400" value="100">
    </div>
    <div class="cropper-actions">
      <button type="button" id="cropperCancel">取消</button>
      <button type="button" class="primary" id="cropperConfirm">确认使用</button>
    </div>
  </div>
</div>

<script>
let rootHandle = null;
let dvdsData = null;
let discFile = null;
let coverFile = null;
let interviews = [];

const statusBox = document.getElementById("statusBox");
function showStatus(msg, ok = true) {
  statusBox.textContent = msg;
  statusBox.className = "status show " + (ok ? "ok" : "err");
}

// ---------- 选择项目文件夹 ----------
document.getElementById("pickFolderBtn").addEventListener("click", async () => {
  try {
    rootHandle = await window.showDirectoryPicker({ mode: "readwrite" });
    const dataDir = await rootHandle.getDirectoryHandle("data");
    const fileHandle = await dataDir.getFileHandle("dvds.json");
    const file = await fileHandle.getFile();
    dvdsData = JSON.parse(await file.text());

    document.getElementById("folderInfo").innerHTML =
      `已连接文件夹：<span class="folder-name">${rootHandle.name}</span>　·　当前已有 ${dvdsData.length} 部作品`;
    document.getElementById("formPanel").style.display = "block";
    showStatus("文件夹连接成功，可以开始操作了。", true);
    applyModeUI();
  } catch (e) {
    if (e.name !== "AbortError") {
      showStatus("选择文件夹失败：" + e.message + "（请确认选的是项目文件夹本身，且里面有 data/dvds.json）", false);
    }
  }
});

// ---------- 模式切换 ----------
function currentMode() {
  const el = document.querySelector('input[name="mode"]:checked');
  return el ? el.value : "add";
}

function isChecked(group) {
  const cb = document.querySelector(`.field-group[data-field="${group}"] .fieldToggle`);
  return cb ? cb.checked : true;
}

function applyFieldDisabled() {
  document.querySelectorAll(".field-group").forEach((group) => {
    const cb = group.querySelector(".fieldToggle");
    const on = cb ? cb.checked : true;
    group.querySelectorAll("input, select, textarea, button").forEach((el) => {
      if (el === cb) return;
      el.disabled = !on;
    });
    group.classList.toggle("dim", !on);
  });
}

document.querySelectorAll(".fieldToggle").forEach((cb) => {
  cb.addEventListener("change", applyFieldDisabled);
});

const HEADINGS = { add: "新增碟片", edit: "修改碟片", deleteDisc: "删除碟片", deleteInterview: "删除采访" };
const UID_HINTS = {
  add: "填一个尚未使用过的编号，提交后成为这张碟片的唯一编号",
  edit: "填已存在的编号，下面勾选要修改的项目，不勾选的保持不变",
  deleteDisc: "填已存在的编号，提交后这张碟片会被整个删除",
  deleteInterview: "填已存在的编号",
};
const SUBMIT_LABELS = {
  add: "提交，写入网站数据",
  edit: "提交修改",
  deleteDisc: "确认删除这张碟片",
  deleteInterview: "确认删除所选采访",
};

function applyModeUI() {
  const mode = currentMode();
  document.getElementById("formPanel").dataset.mode = mode;
  document.getElementById("formHeading").textContent = HEADINGS[mode];
  document.getElementById("uidHintText") && (document.getElementById("uidHintText").textContent = UID_HINTS[mode]);
  document.getElementById("submitBtn").textContent = SUBMIT_LABELS[mode];

  const isEdit = mode === "edit";
  document.querySelectorAll(".field-check").forEach((el) => {
    el.style.display = isEdit ? "flex" : "none";
  });
  document.querySelectorAll(".fieldToggle").forEach((cb) => {
    cb.checked = !isEdit; // 编辑模式默认全部不勾选；新增模式全部视为启用
  });
  applyFieldDisabled();
  updateUidLookup();
}

document.querySelectorAll('input[name="mode"]').forEach((r) => {
  r.addEventListener("change", applyModeUI);
});

// ---------- uid 实时查找提示 ----------
function updateUidLookup() {
  const mode = currentMode();
  const uid = document.getElementById("uid").value.trim();
  const info = document.getElementById("uidLookupInfo");
  if (!uid || !dvdsData) { info.textContent = ""; info.className = ""; return; }
  const found = dvdsData.find((d) => d.id === uid);
  if (mode === "add") {
    if (found) { info.textContent = `⚠ 编号已存在（${found.title}），提交会被跳过`; info.className = "warn"; }
    else { info.textContent = "✓ 编号可用"; info.className = "ok"; }
  } else {
    if (found) {
      info.textContent = `✓ 找到：${found.role ? found.role + " / " : ""}${found.title}（${found.year}），采访 ${(found.interviews || []).length} 条`;
      info.className = "ok";
    } else {
      info.textContent = "⚠ 未找到该编号，提交会被跳过";
      info.className = "warn";
    }
  }
}
document.getElementById("uid").addEventListener("input", updateUidLookup);

// ---------- 选择图片 ----------
async function pickImageFile() {
  const [handle] = await window.showOpenFilePicker({
    types: [{ description: "图片", accept: { "image/*": [".png", ".jpg", ".jpeg", ".webp"] } }],
  });
  return await handle.getFile();
}

document.getElementById("discPickBtn").addEventListener("click", async () => {
  try {
    const file = await pickImageFile();
    openCropper(file);
  } catch (e) { /* 用户取消选择，忽略 */ }
});

document.getElementById("coverPickBtn").addEventListener("click", async () => {
  try {
    coverFile = await pickImageFile();
    document.getElementById("coverFileName").textContent = coverFile.name;
    const thumb = document.getElementById("coverThumb");
    thumb.src = URL.createObjectURL(coverFile);
    thumb.style.display = "inline-block";
  } catch (e) { /* 用户取消选择，忽略 */ }
});

// ---------- 碟片裁剪器 ----------
const cropperModal = document.getElementById("cropperModal");
const cropperCanvas = document.getElementById("cropperCanvas");
const cropperCtx = cropperCanvas.getContext("2d");
const cropperWrap = document.getElementById("cropperWrap");
const cropperZoomInput = document.getElementById("cropperZoom");

const CROP_SIZE = 600;
const CROP_HOLE_R = 46;

let cropperImg = null;
let cropperBaseScale = 1;
let cropperZoom = 100;
let cropperOffsetX = 0;
let cropperOffsetY = 0;
let cropperDragging = false;
let cropperDragStart = null;

function openCropper(file) {
  const img = new Image();
  img.onload = () => {
    cropperImg = img;
    cropperBaseScale = Math.max(CROP_SIZE / img.width, CROP_SIZE / img.height);
    cropperZoom = 100;
    cropperOffsetX = 0;
    cropperOffsetY = 0;
    cropperZoomInput.value = 100;
    drawCropper();
    cropperModal.classList.add("open");
  };
  img.src = URL.createObjectURL(file);
}

function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

function clampCropperOffsets() {
  const scale = cropperBaseScale * (cropperZoom / 100);
  const dw = cropperImg.width * scale;
  const dh = cropperImg.height * scale;
  const lowX = CROP_SIZE / 2 - dw / 2;
  const highX = dw / 2 - CROP_SIZE / 2;
  const lowY = CROP_SIZE / 2 - dh / 2;
  const highY = dh / 2 - CROP_SIZE / 2;
  cropperOffsetX = clamp(cropperOffsetX, lowX, highX);
  cropperOffsetY = clamp(cropperOffsetY, lowY, highY);
}

function drawCropper() {
  if (!cropperImg) return;
  clampCropperOffsets();
  const ctx = cropperCtx;
  ctx.clearRect(0, 0, CROP_SIZE, CROP_SIZE);

  ctx.save();
  ctx.beginPath();
  ctx.arc(CROP_SIZE / 2, CROP_SIZE / 2, CROP_SIZE / 2, 0, Math.PI * 2);
  ctx.clip();

  const scale = cropperBaseScale * (cropperZoom / 100);
  const dw = cropperImg.width * scale;
  const dh = cropperImg.height * scale;
  const dx = CROP_SIZE / 2 - dw / 2 + cropperOffsetX;
  const dy = CROP_SIZE / 2 - dh / 2 + cropperOffsetY;
  ctx.drawImage(cropperImg, dx, dy, dw, dh);
  ctx.restore();

  ctx.save();
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath();
  ctx.arc(CROP_SIZE / 2, CROP_SIZE / 2, CROP_HOLE_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

cropperZoomInput.addEventListener("input", () => {
  cropperZoom = Number(cropperZoomInput.value);
  drawCropper();
});

cropperWrap.addEventListener("pointerdown", (e) => {
  cropperDragging = true;
  cropperDragStart = { x: e.clientX, y: e.clientY, ox: cropperOffsetX, oy: cropperOffsetY };
  cropperWrap.setPointerCapture(e.pointerId);
});
cropperWrap.addEventListener("pointermove", (e) => {
  if (!cropperDragging) return;
  const ratio = CROP_SIZE / cropperWrap.clientWidth;
  cropperOffsetX = cropperDragStart.ox + (e.clientX - cropperDragStart.x) * ratio;
  cropperOffsetY = cropperDragStart.oy + (e.clientY - cropperDragStart.y) * ratio;
  drawCropper();
});
["pointerup", "pointerleave", "pointercancel"].forEach((ev) => {
  cropperWrap.addEventListener(ev, () => { cropperDragging = false; });
});

document.getElementById("cropperCancel").addEventListener("click", () => {
  cropperModal.classList.remove("open");
  cropperImg = null;
});

document.getElementById("cropperConfirm").addEventListener("click", () => {
  cropperCanvas.toBlob((blob) => {
    discFile = new File([blob], "disc.png", { type: "image/png" });
    const url = URL.createObjectURL(blob);
    const thumb = document.getElementById("discThumb");
    thumb.src = url;
    thumb.style.display = "inline-block";
    document.getElementById("discFileName").textContent = "已裁剪（disc.png）";
    const previewImg = document.getElementById("previewDiscImg");
    previewImg.src = url;
    previewImg.style.display = "block";
    cropperModal.classList.remove("open");
    cropperImg = null;
  }, "image/png");
});

// ---------- 采访列表（暂存，提交时写入） ----------
document.getElementById("addInterviewBtn").addEventListener("click", () => {
  const title = document.getElementById("ivTitle").value.trim();
  const titleZh = document.getElementById("ivTitleZh").value.trim();
  const date = document.getElementById("ivDate").value.trim();
  const source = document.getElementById("ivSource").value.trim();
  const url = document.getElementById("ivUrl").value.trim();
  const ja = document.getElementById("ivJa").value.replace(/\n+$/, "");
  const zh = document.getElementById("ivZh").value.replace(/\n+$/, "");

  if (!title && !ja && !zh) {
    alert("至少填一个采访标题，或日语/中文内容，再添加。");
    return;
  }

  interviews.push({ title, title_zh: titleZh, date, source, url, excerpt_ja: ja, excerpt_zh: zh });
  renderIvList();

  ["ivTitle", "ivTitleZh", "ivDate", "ivSource", "ivUrl", "ivJa", "ivZh"].forEach(
    (id) => (document.getElementById(id).value = "")
  );
});

function renderIvList() {
  const box = document.getElementById("ivList");
  box.innerHTML = interviews.map((iv, i) => `
    <div class="iv-item">
      <span>${iv.date || "未填日期"} · ${iv.title || "（无标题）"}</span>
      <button type="button" data-i="${i}" class="removeIvBtn ghost">删除</button>
    </div>
  `).join("");
  box.querySelectorAll(".removeIvBtn").forEach((btn) => {
    btn.addEventListener("click", () => {
      interviews.splice(Number(btn.dataset.i), 1);
      renderIvList();
    });
  });
}

// ---------- 工具函数 ----------
async function getOrCreateDir(parent, name) {
  return await parent.getDirectoryHandle(name, { create: true });
}

async function writeFile(dirHandle, filename, fileBlob) {
  const fh = await dirHandle.getFileHandle(filename, { create: true });
  const writable = await fh.createWritable();
  await writable.write(fileBlob);
  await writable.close();
}

async function deleteFileByPath(dirHandle, relPath) {
  if (!relPath) return;
  const filename = relPath.split("/").pop();
  try { await dirHandle.removeEntry(filename); } catch (e) { /* 本来就不存在，忽略 */ }
}

function extOf(file, fallback) {
  const m = file.name.match(/\.[a-zA-Z0-9]+$/);
  return m ? m[0].toLowerCase() : fallback;
}

async function saveJson(dataDir) {
  const jsonFh = await dataDir.getFileHandle("dvds.json", { create: true });
  const writable = await jsonFh.createWritable();
  await writable.write(JSON.stringify(dvdsData, null, 2));
  await writable.close();
}

// ---------- 表单重置 ----------
function clearFileState() {
  discFile = null; coverFile = null;
  document.getElementById("discFileName").textContent = "未选择";
  document.getElementById("coverFileName").textContent = "未选择";
  document.getElementById("discThumb").style.display = "none";
  document.getElementById("coverThumb").style.display = "none";
  document.getElementById("previewDiscImg").style.display = "none";
  interviews = [];
  renderIvList();
}

function resetForm() {
  document.getElementById("uid").value = "";
  document.getElementById("title").value = "";
  document.getElementById("role").value = "";
  document.getElementById("year").value = "";
  document.getElementById("textPosition").value = "left";
  document.getElementById("deleteIvIndexes").value = "";
  clearFileState();
  applyModeUI();
  updatePreview();
}

// ---------- 提交 ----------
document.getElementById("submitBtn").addEventListener("click", async () => {
  if (!rootHandle || !dvdsData) return showStatus("请先选择项目文件夹。", false);

  const mode = currentMode();
  const uid = document.getElementById("uid").value.trim();
  if (!uid) return showStatus("请填写碟片编号 (uid)。", false);

  const idx = dvdsData.findIndex((d) => d.id === uid);

  try {
    const imagesDir = await getOrCreateDir(rootHandle, "images");
    const spinesDir = await getOrCreateDir(imagesDir, "spines");
    const coversDir = await getOrCreateDir(imagesDir, "covers");
    const dataDir = await getOrCreateDir(rootHandle, "data");

    if (mode === "add") {
      if (idx !== -1) return; // uid 已存在，静默跳过

      const title = document.getElementById("title").value.trim();
      const role = document.getElementById("role").value.trim();
      const yearRaw = document.getElementById("year").value.trim();
      if (!title || !yearRaw || isNaN(Number(yearRaw)) || !discFile) return; // 缺必填项，静默跳过
      const year = Number(yearRaw);

      const discExt = extOf(discFile, ".png");
      const discName = `${uid}${discExt}`;
      await writeFile(spinesDir, discName, discFile);
      const discRel = `images/spines/${discName}`;

      let coverRel = discRel;
      if (coverFile) {
        const coverExt = extOf(coverFile, ".jpg");
        const coverName = `${uid}${coverExt}`;
        await writeFile(coversDir, coverName, coverFile);
        coverRel = `images/covers/${coverName}`;
      }

      dvdsData.push({
        id: uid, title, role, year,
        textPosition: document.getElementById("textPosition").value,
        disc: discRel, cover: coverRel,
        interviews: interviews,
      });

      await saveJson(dataDir);
      showStatus(`已新增 uid=${uid}《${title}》（${year}），采访 ${interviews.length} 条。记得去终端 git push。`, true);
      resetForm();

    } else if (mode === "edit") {
      if (idx === -1) return; // uid 不存在，静默跳过
      const record = dvdsData[idx];

      if (isChecked("basic")) {
        const title = document.getElementById("title").value.trim();
        const yearRaw = document.getElementById("year").value.trim();
        if (title) record.title = title;
        record.role = document.getElementById("role").value.trim();
        if (yearRaw && !isNaN(Number(yearRaw))) record.year = Number(yearRaw);
      }

      if (isChecked("textPosition")) {
        record.textPosition = document.getElementById("textPosition").value;
      }

      if (isChecked("disc") && discFile) {
        const wasFallbackCover = record.cover === record.disc;
        await deleteFileByPath(spinesDir, record.disc);
        const ext = extOf(discFile, ".png");
        const name = `${uid}${ext}`;
        await writeFile(spinesDir, name, discFile);
        const newDiscRel = `images/spines/${name}`;
        record.disc = newDiscRel;
        if (wasFallbackCover && !isChecked("cover")) {
          record.cover = newDiscRel;
        }
      }

      if (isChecked("cover") && coverFile) {
        await deleteFileByPath(coversDir, record.cover);
        const ext = extOf(coverFile, ".jpg");
        const name = `${uid}${ext}`;
        await writeFile(coversDir, name, coverFile);
        record.cover = `images/covers/${name}`;
      }

      if (isChecked("interview") && interviews.length) {
        record.interviews = [...(record.interviews || []), ...interviews];
      }

      await saveJson(dataDir);
      showStatus(`已更新 uid=${uid}。记得去终端 git push。`, true);
      resetForm();

    } else if (mode === "deleteDisc") {
      if (idx === -1) return;
      const record = dvdsData[idx];
      await deleteFileByPath(spinesDir, record.disc);
      if (record.cover && record.cover !== record.disc) {
        await deleteFileByPath(coversDir, record.cover);
      }
      dvdsData.splice(idx, 1);
      await saveJson(dataDir);
      showStatus(`已删除 uid=${uid}。记得去终端 git push。`, true);
      resetForm();

    } else if (mode === "deleteInterview") {
      if (idx === -1) return;
      const record = dvdsData[idx];
      const raw = document.getElementById("deleteIvIndexes").value.trim();
      const nums = raw.split(/\s+/).filter(Boolean).map(Number)
        .filter((n) => Number.isInteger(n) && n >= 1 && n <= (record.interviews || []).length);
      if (!nums.length) return;
      const uniqueNums = [...new Set(nums)].sort((a, b) => b - a);
      uniqueNums.forEach((n) => record.interviews.splice(n - 1, 1));
      await saveJson(dataDir);
      showStatus(`已删除 uid=${uid} 的第 ${uniqueNums.slice().reverse().join("、")} 篇采访。记得去终端 git push。`, true);
      resetForm();
    }

    document.getElementById("folderInfo").innerHTML =
      `已连接文件夹：<span class="folder-name">${rootHandle.name}</span>　·　当前已有 ${dvdsData.length} 部作品`;

  } catch (e) {
    showStatus("操作失败：" + e.message, false);
  }
});

// ---------- 实时预览（DVD文字位置） ----------
function updatePreview() {
  const title = document.getElementById("title").value.trim() || "剧名";
  const role = document.getElementById("role").value.trim();
  const pos = document.getElementById("textPosition").value;

  document.getElementById("previewPrimary").textContent = role || title;
  document.getElementById("previewSecondary").textContent = role ? title : "";
  document.getElementById("previewLabel").className = `preview-label pos-${pos}`;
}
["title", "role", "textPosition"].forEach((id) => {
  document.getElementById(id).addEventListener("input", updatePreview);
});
updatePreview();
